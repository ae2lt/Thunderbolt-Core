plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.140'
}

version = mod_version
group = mod_group_id

base {
    archivesName = project.findProperty("artifact_name") ?: mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    version = project.neo_version

    // Mixins on NeoForge 1.20.2+ need no refmap (runtime uses official mappings).
    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

repositories {
    mavenLocal()
    mavenCentral()
    maven {
        url = "https://www.cursemaven.com"
        content {
            includeGroup "curse.maven"
        }
    }
}

dependencies {
    // AE2 — publicly available on CurseForge maven. compileOnly: this layer patches AE2 via
    // mixins; AE2 is provided by the modpack at runtime. The pure planner core under
    // `crafting.core` has NO AE2 dependency and is unit-tested standalone.
    compileOnly "curse.maven:applied-energistics-2-223794:7027323"

    // AdvancedAE (+ its compile-time companions) — the lib hosts the batch-CPU mixin/accessors that
    // target AAE's crafting CPU. compileOnly: AAE is provided by the modpack at runtime when present;
    // the @Pseudo mixins simply no-op if AAE is absent.
    compileOnly "curse.maven:advancedae-1084104:7668664"
    compileOnly "curse.maven:extendedae-892005:7727948"
    compileOnly "curse.maven:glodium-957920:5821676"
    compileOnly "curse.maven:applied-flux-965012:7429565"

    // Unit tests for the pure planner core (no Minecraft/AE2 needed).
    testImplementation platform("org.junit:junit-bom:5.10.2")
    testImplementation "org.junit.jupiter:junit-jupiter"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

test {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
    }
}

var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
        minecraft_version      : minecraft_version,
        minecraft_version_range: minecraft_version_range,
        neo_version            : neo_version,
        neo_version_range      : neo_version_range,
        loader_version_range   : loader_version_range,
        mod_id                 : mod_id,
        mod_name               : mod_name,
        mod_license            : mod_license,
        mod_version            : mod_version,
        mod_authors            : mod_authors,
        mod_description        : mod_description]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
            artifactId = mod_id
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

if (plugins.hasPlugin('idea')) {
    idea {
        module {
            downloadSources = true
            downloadJavadoc = true
        }
    }
}
